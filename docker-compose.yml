services:
  # Kafka (KRaft 모드 - Zookeeper 없이 단독 실행)
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      # broker: 메시지 처리 / controller: 클러스터 메타데이터 관리 (KRaft)
      KAFKA_PROCESS_ROLES: broker,controller
      # PLAINTEXT: 클라이언트용 / CONTROLLER: KRaft 내부 통신용
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      # 외부 클라이언트(Agent, Consumer)가 접속할 주소
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      # KRaft 클러스터 투표 구성 (node_id@host:port)
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # 단일 브로커이므로 replication factor 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # KRaft 클러스터 고유 ID (변경 금지)
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  # Kafka topic 초기 생성 (컨테이너 실행 후 1회 수행)
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic windows_event_logs --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic system_metrics --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic file_access_logs --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic network_logs --partitions 1 --replication-factor 1
      "
    restart: on-failure

  # MinIO - S3 호환 오브젝트 스토리지 (Parquet 파일 저장)
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # 웹 콘솔
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO 버킷 초기 생성 (lakehouse 버킷)
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      mc alias set local http://minio:9000 minioadmin minioadmin
      mc mb --ignore-existing local/lakehouse
      "
    restart: on-failure

  # Hive Metastore - Iceberg 테이블 스키마/메타데이터 저장
  hive-metastore:
    image: apache/hive:4.0.0
    container_name: hive-metastore
    ports:
      - "9083:9083"
    environment:
      SERVICE_NAME: metastore
      # Derby: 내장 DB (토이 프로젝트용, 프로덕션은 PostgreSQL/MySQL 사용)
      DB_DRIVER: derby
      IS_RESUME: "true"
    volumes:
      - hive-data:/opt/hive/data
      - ./infra/hive-config/hive-site.xml:/opt/hive/conf/hive-site.xml
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9083"]
      interval: 15s
      timeout: 10s
      retries: 10

  # Trino - Iceberg 테이블 SQL 쿼리 엔진
  trino:
    image: trinodb/trino:435
    container_name: trino
    ports:
      - "8080:8080"
    volumes:
      - ./infra/trino/config.properties:/etc/trino/config.properties
      - ./infra/trino/jvm.config:/etc/trino/jvm.config
      - ./infra/trino/catalog/iceberg.properties:/etc/trino/catalog/iceberg.properties
    depends_on:
      hive-metastore:
        condition: service_healthy

volumes:
  kafka-data:
  minio-data:
  hive-data:
